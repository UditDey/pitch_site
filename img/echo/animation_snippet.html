    <script>
        (() => {
            const root = document.currentScript.closest(".echo-viz-container");
            const svg = root.querySelector("#echo-svg");

            const SVG_NS = "http://www.w3.org/2000/svg";
            const ctrlCurvesG = svg.querySelector("#ctrl-curves");
            const xferCurvesG = svg.querySelector("#xfer-curves");
            const ctrlPktsG = svg.querySelector("#ctrl-packets");
            const xferPktsG = svg.querySelector("#xfer-packets");
            const copyArrow = svg.querySelector("#copy-arrow");
            const validBits = svg.querySelector("#valid-bits");
            const dataReceivedLabel = svg.querySelector("#data-received-label");

            const L_PX = [85, 115, 165, 195, 245, 275, 325, 355];
            const R_PX = [555, 585, 635, 665, 715, 745, 795, 825];

            const L_SW = [
                [{ x: 70, y: 80 }, { x: 150, y: 80 }, { x: 230, y: 80 }, { x: 310, y: 80 }],
                [{ x: 70, y: 175 }, { x: 150, y: 175 }, { x: 230, y: 175 }, { x: 310, y: 175 }],
                [{ x: 70, y: 270 }, { x: 150, y: 270 }, { x: 230, y: 270 }, { x: 310, y: 270 }],
            ];
            const R_SW = [
                [{ x: 540, y: 80 }, { x: 620, y: 80 }, { x: 700, y: 80 }, { x: 780, y: 80 }],
                [{ x: 540, y: 175 }, { x: 620, y: 175 }, { x: 700, y: 175 }, { x: 780, y: 175 }],
                [{ x: 540, y: 270 }, { x: 620, y: 270 }, { x: 700, y: 270 }, { x: 780, y: 270 }],
            ];

            const Y = { top: 40, s1T: 80, s1B: 120, s2T: 175, s2B: 215, s3T: 270, s3B: 310, bot: 350 };
            const N = 8, LOG_N = 3;
            const ADDRESSES = [2, 2, 3, 5, 5, 5, 6, 6];
            const SW_W = 60, SW_H = 40;
            const COLORS = ["#e63946", "#f4845f", "#d4a017", "#2a9d8f", "#457b9d", "#6a4c93", "#1d3557", "#e76f51"];

            function omegaShuffle(pos) { return ((pos << 1) | (pos >> (LOG_N - 1))) & (N - 1); }

            // RTL-faithful simulation of ctrl_switch behavior
            function simulate() {
                let pos = ADDRESSES.map((_, i) => i);
                let alive = new Array(N).fill(true);
                const snaps = [pos.slice()];
                const aliveSnaps = [alive.slice()];
                const switchInfo = [];
                const killReason = new Array(N).fill(null);

                for (let s = 0; s < LOG_N; s++) {
                    const stageBit = LOG_N - 1 - s;
                    const newPos = pos.slice();
                    const newAlive = alive.slice();
                    const stageInfo = [];

                    for (let sw = 0; sw < N / 2; sw++) {
                        const slot0 = sw * 2, slot1 = sw * 2 + 1;

                        let p0 = -1, p1 = -1;
                        for (let i = 0; i < N; i++) {
                            if (alive[i] && pos[i] === slot0) p0 = i;
                            if (alive[i] && pos[i] === slot1) p1 = i;
                        }

                        const v0 = p0 >= 0, v1 = p1 >= 0;
                        const a0 = v0 ? ADDRESSES[p0] : 0;
                        const a1 = v1 ? ADDRESSES[p1] : 0;

                        const doSwap = v0 ? ((a0 >> stageBit) & 1) === 1
                            : v1 ? ((a1 >> stageBit) & 1) === 0
                                : false;

                        const doMerge = v0 && v1 && a0 === a1;

                        const x0p = doSwap ? p1 : p0;
                        const x1p = doSwap ? p0 : p1;
                        const x0v = doSwap ? v1 : v0;
                        const x1v = doSwap ? v0 : v1;

                        if (doMerge) {
                            const mergeSlot = doSwap ? slot1 : slot0;
                            if (x0p >= 0) newPos[x0p] = mergeSlot;
                            if (x1p >= 0) newPos[x1p] = mergeSlot;
                        } else {
                            if (x0p >= 0) newPos[x0p] = slot0;
                            if (x1p >= 0) newPos[x1p] = slot1;
                        }

                        if (x0v && ((ADDRESSES[x0p] >> stageBit) & 1) === 1) {
                            newAlive[x0p] = false;
                            killReason[x0p] = doMerge ? 'merge' : 'block';
                        }
                        if (x1v && ((ADDRESSES[x1p] >> stageBit) & 1) === 0) {
                            newAlive[x1p] = false;
                            killReason[x1p] = doMerge ? 'merge' : 'block';
                        }

                        for (let i = 0; i < N; i++) {
                            if (!alive[i]) {
                                if (pos[i] === slot0) newPos[i] = doSwap ? slot1 : slot0;
                                else if (pos[i] === slot1) newPos[i] = doSwap ? slot0 : slot1;
                            }
                        }

                        stageInfo.push({ swap: doSwap, merge: doMerge });
                    }

                    pos = newPos; alive = newAlive;
                    switchInfo.push(stageInfo);
                    snaps.push(pos.slice());
                    aliveSnaps.push(alive.slice());

                    if (s < LOG_N - 1) {
                        const sh = pos.slice();
                        for (let i = 0; i < N; i++) sh[i] = omegaShuffle(pos[i]);
                        pos = sh;
                        snaps.push(pos.slice());
                        aliveSnaps.push(alive.slice());
                    }
                }

                return { snaps, switchInfo, aliveSnaps, killReason };
            }

            const simResult = simulate();
            const sim = simResult.snaps;
            const aliveSnaps = simResult.aliveSnaps;
            const killReason = simResult.killReason;
            const swStates = simResult.switchInfo.map(stage =>
                stage.map(s => {
                    if (s.merge && !s.swap) return 'merge-left';
                    if (s.merge && s.swap) return 'merge-right';
                    if (s.swap) return 'swap';
                    return 'pass';
                })
            );

            const deathSnap = new Array(N).fill(-1);
            for (let i = 0; i < N; i++) {
                for (let s = 1; s < aliveSnaps.length; s++) {
                    if (aliveSnaps[s - 1][i] && !aliveSnaps[s][i]) { deathSnap[i] = s; break; }
                }
            }

            function isAliveCtrl(pkt, snapIdx) { return aliveSnaps[snapIdx][pkt]; }
            function isVisibleXfer(pkt, destSnapIdx) {
                if (deathSnap[pkt] === -1) return true;
                if (killReason[pkt] === 'merge') return destSnapIdx <= deathSnap[pkt];
                return false;
            }

            function makeBez(sx, sy, ex, ey) {
                return { from: { x: sx, y: sy }, cp1: { x: sx, y: sy + (ey - sy) * 2 / 3 }, cp2: { x: ex, y: sy + (ey - sy) / 3 }, to: { x: ex, y: ey } };
            }
            function evalBez(c, t) {
                const u = 1 - t;
                return {
                    x: u * u * u * c.from.x + 3 * u * u * t * c.cp1.x + 3 * u * t * t * c.cp2.x + t * t * t * c.to.x,
                    y: u * u * u * c.from.y + 3 * u * u * t * c.cp1.y + 3 * u * t * t * c.cp2.y + t * t * t * c.to.y
                };
            }
            function bezD(c) { return `M${c.from.x},${c.from.y} C${c.cp1.x},${c.cp1.y} ${c.cp2.x},${c.cp2.y} ${c.to.x},${c.to.y}`; }

            function getCurves(boxes, s, sw, topToBot) {
                const box = boxes[s][sw];
                const lx = box.x + SW_W / 4, rx = box.x + 3 * SW_W / 4;
                const t = box.y, b = box.y + SW_H;
                const [fromY, toY] = topToBot ? [t, b] : [b, t];
                const state = swStates[s][sw];

                if (topToBot) {
                    switch (state) {
                        case 'swap': return { upper: makeBez(lx, fromY, rx, toY), lower: makeBez(rx, fromY, lx, toY) };
                        case 'merge-left': return { upper: makeBez(lx, fromY, lx, toY), lower: makeBez(rx, fromY, lx, toY) };
                        case 'merge-right': return { upper: makeBez(lx, fromY, rx, toY), lower: makeBez(rx, fromY, rx, toY) };
                        default: return { upper: makeBez(lx, fromY, lx, toY), lower: makeBez(rx, fromY, rx, toY) };
                    }
                } else {
                    switch (state) {
                        case 'swap': return { upper: makeBez(lx, fromY, rx, toY), lower: makeBez(rx, fromY, lx, toY) };
                        case 'merge-left': return { upper: makeBez(lx, fromY, lx, toY), lower: makeBez(lx, fromY, rx, toY) };
                        case 'merge-right': return { upper: makeBez(rx, fromY, lx, toY), lower: makeBez(rx, fromY, rx, toY) };
                        default: return { upper: makeBez(lx, fromY, lx, toY), lower: makeBez(rx, fromY, rx, toY) };
                    }
                }
            }

            function buildCurveGroups(parentG, boxes, topToBot) {
                const groups = [], allC = [];
                for (let s = 0; s < LOG_N; s++) {
                    const g = document.createElementNS(SVG_NS, "g");
                    g.style.display = "none"; parentG.appendChild(g); groups.push(g);
                    const sc = [];
                    for (let sw = 0; sw < N / 2; sw++) {
                        const curves = getCurves(boxes, s, sw, topToBot);
                        sc.push(curves);
                        for (const cv of [curves.upper, curves.lower]) {
                            const p = document.createElementNS(SVG_NS, "path");
                            p.setAttribute("d", bezD(cv));
                            p.setAttribute("fill", "none");
                            p.setAttribute("stroke", "#999");
                            p.setAttribute("stroke-width", "1.3");
                            p.setAttribute("stroke-linecap", "round");
                            g.appendChild(p);
                        }
                    }
                    allC.push(sc);
                }
                return { groups, curves: allC };
            }

            const ctrl = buildCurveGroups(ctrlCurvesG, R_SW, true);
            const xfer = buildCurveGroups(xferCurvesG, L_SW, false);

            function revealCtrlCurves(mx) { for (let s = 0; s < LOG_N; s++) ctrl.groups[s].style.display = s <= mx ? "" : "none"; }
            function revealXferCurves(mx) { for (let s = 0; s < LOG_N; s++) xfer.groups[s].style.display = s <= mx ? "" : "none"; }
            function hideCtrlCurves() { for (let s = 0; s < LOG_N; s++) ctrl.groups[s].style.display = "none"; }
            function hideXferCurves() { for (let s = 0; s < LOG_N; s++) xfer.groups[s].style.display = "none"; }

            const C_STEPS = [
                { type: 'sw', stg: 0, yS: Y.top, yE: Y.s1B, swT: Y.s1T, swB: Y.s1B },
                { type: 'sh', yS: Y.s1B, yE: Y.s2T },
                { type: 'sw', stg: 1, yS: Y.s2T, yE: Y.s2B, swT: Y.s2T, swB: Y.s2B },
                { type: 'sh', yS: Y.s2B, yE: Y.s3T },
                { type: 'sw', stg: 2, yS: Y.s3T, yE: Y.bot, swT: Y.s3T, swB: Y.s3B },
            ];
            const C_SN_S = [0, 1, 2, 3, 4], C_SN_E = [1, 2, 3, 4, 5];

            const T_STEPS = [
                { type: 'sw', stg: 2, yS: Y.bot, yE: Y.s3T, swT: Y.s3T, swB: Y.s3B },
                { type: 'sh', yS: Y.s3T, yE: Y.s2B },
                { type: 'sw', stg: 1, yS: Y.s2B, yE: Y.s2T, swT: Y.s2T, swB: Y.s2B },
                { type: 'sh', yS: Y.s2T, yE: Y.s1B },
                { type: 'sw', stg: 0, yS: Y.s1B, yE: Y.top, swT: Y.s1T, swB: Y.s1B },
            ];
            const T_SN_S = [5, 4, 3, 2, 1], T_SN_E = [4, 3, 2, 1, 0];

            function buildPaths(portX, boxes, steps, snS, snE, visFn) {
                const paths = [];
                for (let i = 0; i < N; i++) {
                    const pkt = [];
                    for (let si = 0; si < steps.length; si++) {
                        const step = steps[si];
                        const startPos = sim[snS[si]][i], endPos = sim[snE[si]][i];
                        const startX = portX[startPos], endX = portX[endPos];
                        const vis = visFn(i, si);
                        let bez = null;

                        if (step.type === 'sw') {
                            const sw = Math.floor(startPos / 2);
                            const box = boxes[step.stg][sw];
                            const lx = box.x + SW_W / 4, rx = box.x + 3 * SW_W / 4;
                            const fromX = (startPos % 2 === 0) ? lx : rx;
                            const toX = (endPos % 2 === 0) ? lx : rx;
                            const goingUp = step.yE < step.yS;
                            bez = goingUp ? makeBez(fromX, step.swB, toX, step.swT)
                                : makeBez(fromX, step.swT, toX, step.swB);
                        }

                        pkt.push({ vis, startX, endX, bez });
                    }
                    paths.push(pkt);
                }
                return paths;
            }

            const ctrlPaths = buildPaths(R_PX, R_SW, C_STEPS, C_SN_S, C_SN_E, (pkt, si) => isAliveCtrl(pkt, C_SN_S[si]));
            const xferPaths = buildPaths(L_PX, L_SW, T_STEPS, T_SN_S, T_SN_E, (pkt, si) => isVisibleXfer(pkt, T_SN_E[si]));

            function getPos(paths, steps, si, pkt, t) {
                const p = paths[pkt][si];
                if (!p.vis) return null;
                const s = steps[si];

                if (s.type === 'sh') {
                    return { x: p.startX + (p.endX - p.startX) * t, y: s.yS + (s.yE - s.yS) * t };
                }

                const goingUp = s.yE < s.yS;
                const entryY = goingUp ? s.swB : s.swT;
                const exitY = goingUp ? s.swT : s.swB;

                const totY = Math.abs(s.yE - s.yS);
                const seg1 = Math.abs(entryY - s.yS);
                const seg2 = s.swB - s.swT;
                const seg3 = Math.abs(s.yE - exitY);

                const f1 = seg1 / totY, f2 = seg2 / totY;

                if (f1 > 0 && t <= f1) {
                    const lt = t / f1;
                    return { x: p.startX + (p.bez.from.x - p.startX) * lt, y: s.yS + (entryY - s.yS) * lt };
                } else if (t <= f1 + f2) {
                    const bt = f2 > 0 ? (t - f1) / f2 : 0;
                    return evalBez(p.bez, bt);
                } else {
                    const f3 = seg3 / totY;
                    const pt = f3 > 0 ? (t - f1 - f2) / f3 : 1;
                    return { x: p.bez.to.x + (p.endX - p.bez.to.x) * pt, y: exitY + (s.yE - exitY) * pt };
                }
            }

            function createPackets(parent, labels, colors) {
                const els = [];
                for (let i = 0; i < N; i++) {
                    const g = document.createElementNS(SVG_NS, "g"); g.style.display = "none";
                    const c = document.createElementNS(SVG_NS, "circle");
                    c.setAttribute("r", "10");
                    c.setAttribute("fill", colors[i]);
                    c.setAttribute("stroke", "#fff");
                    c.setAttribute("stroke-width", "1.5");
                    g.appendChild(c);

                    const lb = document.createElementNS(SVG_NS, "text");
                    lb.setAttribute("class", "packet-label");
                    lb.setAttribute("text-anchor", "middle");
                    lb.setAttribute("dy", "3.5");
                    lb.textContent = labels[i];
                    g.appendChild(lb);

                    parent.appendChild(g);
                    els.push(g);
                }
                return els;
            }

            const cLabels = ADDRESSES.map(a => a.toString());
            const cPkts = createPackets(ctrlPktsG, cLabels, COLORS);

            const tLabels = ADDRESSES.map(a => String.fromCharCode(65 + a));
            const tColors = ADDRESSES.map(a => COLORS[a]);
            const tPkts = createPackets(xferPktsG, tLabels, tColors);

            function setPkt(els, i, x, y) { els[i].style.display = ""; els[i].setAttribute("transform", `translate(${x},${y})`); }
            function hideSet(els) { for (let i = 0; i < N; i++) els[i].style.display = "none"; }
            function hidePkt(els, i) { els[i].style.display = "none"; }
            function ease(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

            const SD = 490, SP = 210, NS = 5;
            const FLOW = NS * SD + (NS - 1) * SP;
            const PHASES = [20, FLOW, 500, 800, 50, FLOW, 1200, 200];
            const TOTAL = PHASES.reduce((a, b) => a + b, 0);

            function stepFromFlow(flowT) {
                const blk = SD + SP;
                const si = Math.min(Math.floor(flowT / blk), NS - 1);
                const wi = flowT - si * blk;
                const t = wi < SD ? ease(wi / SD) : 1;
                return { si, t };
            }

            let t0 = null;
            function animate(ts) {
                if (!t0) t0 = ts;
                const el = (ts - t0) % TOTAL;
                let ph = 0, acc = 0;
                for (let i = 0; i < PHASES.length; i++) { if (el < acc + PHASES[i]) { ph = i; break; } acc += PHASES[i]; }
                const pT = el - acc;

                dataReceivedLabel.style.display = "none";

                switch (ph) {
                    case 0:
                        hideSet(cPkts); hideSet(tPkts); hideCtrlCurves(); hideXferCurves();
                        copyArrow.style.display = "none"; validBits.style.display = "none";
                        for (let i = 0; i < N; i++) setPkt(cPkts, i, R_PX[sim[0][i]], Y.top);
                        break;

                    case 1: {
                        hideSet(tPkts); copyArrow.style.display = "none"; validBits.style.display = "none"; hideXferCurves();
                        const { si, t } = stepFromFlow(pT);
                        const st = C_STEPS[si];
                        const mx = st.type === 'sw' ? st.stg : C_STEPS[Math.max(0, si - 1)].stg;
                        revealCtrlCurves(mx);
                        for (let i = 0; i < N; i++) {
                            const p = getPos(ctrlPaths, C_STEPS, si, i, t);
                            if (!p) { hidePkt(cPkts, i); continue; }
                            setPkt(cPkts, i, p.x, p.y);
                        }
                        break;
                    }

                    case 2:
                        revealCtrlCurves(LOG_N - 1); hideSet(tPkts);
                        copyArrow.style.display = "none"; validBits.style.display = "none";
                        for (let i = 0; i < N; i++) {
                            if (!isAliveCtrl(i, 5)) { hidePkt(cPkts, i); continue; }
                            setPkt(cPkts, i, R_PX[sim[5][i]], Y.bot);
                        }
                        break;

                    case 3:
                        revealCtrlCurves(LOG_N - 1); revealXferCurves(LOG_N - 1);
                        copyArrow.style.display = ""; validBits.style.display = "";
                        hideSet(tPkts);
                        for (let i = 0; i < N; i++) {
                            if (!isAliveCtrl(i, 5)) { hidePkt(cPkts, i); continue; }
                            setPkt(cPkts, i, R_PX[sim[5][i]], Y.bot);
                        }
                        break;

                    case 4:
                        revealCtrlCurves(LOG_N - 1); revealXferCurves(LOG_N - 1);
                        copyArrow.style.display = ""; validBits.style.display = "";
                        hideSet(cPkts);
                        for (let i = 0; i < N; i++) {
                            if (killReason[i] === 'block') { hidePkt(tPkts, i); continue; }
                            setPkt(tPkts, i, L_PX[sim[5][i]], Y.bot);
                        }
                        break;

                    case 5: {
                        hideSet(cPkts); copyArrow.style.display = ""; validBits.style.display = "";
                        revealCtrlCurves(LOG_N - 1); revealXferCurves(LOG_N - 1);
                        const { si, t } = stepFromFlow(pT);
                        for (let i = 0; i < N; i++) {
                            const p = getPos(xferPaths, T_STEPS, si, i, t);
                            if (!p) { hidePkt(tPkts, i); continue; }
                            setPkt(tPkts, i, p.x, p.y);
                        }
                        break;
                    }

                    case 6:
                        hideSet(cPkts); revealCtrlCurves(LOG_N - 1); revealXferCurves(LOG_N - 1);
                        copyArrow.style.display = ""; validBits.style.display = "";
                        dataReceivedLabel.style.display = "";
                        for (let i = 0; i < N; i++) {
                            if (killReason[i] === 'block') { hidePkt(tPkts, i); continue; }
                            setPkt(tPkts, i, L_PX[sim[0][i]], Y.top);
                        }
                        break;

                    case 7:
                        hideSet(cPkts); hideSet(tPkts); hideCtrlCurves(); hideXferCurves();
                        copyArrow.style.display = "none"; validBits.style.display = "none";
                        break;
                }

                requestAnimationFrame(animate);
            }

            requestAnimationFrame(animate);
        })();
    </script>
</div>
